<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="bg"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  <input id="searchBox" placeholder="Search AI tools..." oninput="renderTools()" />
</div>

<!-- HEADER -->
<header class="header">
  <h1>AI Store</h1>
  <p>Discover the best AI tools</p>
</header>

<!-- TOOLS -->
<div id="toolsContainer" class="grid"></div>

<!-- TOOL PAGE -->
<div id="toolPage" class="tool-page">
  <button onclick="closeTool()">⬅ Back</button>
  <h2 id="toolName"></h2>
  <p id="toolDesc"></p>
  <a id="toolLink" target="_blank">Open Tool</a>
</div>

<script src="script.js"></script>
</body>
</html>
