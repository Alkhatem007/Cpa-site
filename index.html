<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="topbar">

  <button onclick="toggleTheme()" id="themeBtn">🌙</button>

  <select onchange="changeCategory(this.value)">
    <option value="all">All</option>
    <option value="writing">Writing</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>

  <input id="search" placeholder="Search..." oninput="render()" />

</div>

<h1 class="title">AI Store</h1>

<div id="grid"></div>

<!-- TOOL PAGE -->
<div id="page" class="page">
  <button onclick="closePage()">⬅ Back</button>
  <h2 id="pName"></h2>
  <p id="pDesc"></p>
  <a id="pLink" target="_blank">Open</a>
</div>

<script src="script.js"></script>
</body>
</html>
