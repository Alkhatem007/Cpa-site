<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">

  <select id="langSelect" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="ar">العربية</option>
    <option value="fr">Français</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="pt">Português</option>
    <option value="hi">Hindi</option>
  </select>

  <button onclick="openAuth()" class="auth-btn">
    <span id="authText">Login / Sign Up</span>
  </button>

</div>

<!-- HEADER -->
<header class="header">
  <h1 id="title">AI Store</h1>
  <p id="subtitle">Find the best AI tools in one place</p>

  <input type="text" id="searchBox" placeholder="Search AI tools..." />
</header>

<!-- TOOLS -->
<div id="toolsContainer" class="grid"></div>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
  <div class="modal-content">

    <h2 id="modalTitle">Account Access</h2>

    <p id="modalText">
      Create your account to unlock personalized AI tools experience.
    </p>

    <div class="modal-buttons">
      <button class="yes" onclick="fakeSignup()">
        Continue
      </button>

      <button class="no" onclick="closeAuth()">
        Cancel
      </button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
